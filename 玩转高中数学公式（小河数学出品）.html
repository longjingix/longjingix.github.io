<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数学游乐场 · 高中核心公式趣味学习</title>
    <!-- 使用 MathJax 3 渲染标准数学公式 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                tags: 'none'
            },
            options: {
                ignoreHtmlClass: 'no-mathjax',
                processHtmlClass: 'math-formula'
            },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    // 渲染完成后显示公式数量
                    setTimeout(() => {
                        document.querySelectorAll('.math-formula').forEach(el => {
                            if (el.innerHTML.trim() === '' && el.getAttribute('data-latex')) {
                                el.textContent = el.getAttribute('data-latex');
                            }
                        });
                    }, 500);
                }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f1f5f9; font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; }
        .flip-card { background: transparent; width: 100%; height: 200px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; border-radius: 1rem; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1rem; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 0.75rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; overflow-y: auto; }
        .flip-front { background: white; border: 1px solid #e2e8f0; }
        .flip-back { background: linear-gradient(135deg, #3b82f6, #1e40af); color: white; transform: rotateY(180deg); font-weight: 500; }
        .match-card { transition: all 0.2s; cursor: pointer; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        .match-card.selected { background-color: #dbeafe; border-color: #3b82f6; transform: scale(0.97); }
        .match-card.matched { opacity: 0.5; background: #e2e8f0; text-decoration: line-through; pointer-events: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; opacity: 0; transition: opacity 0.2s; z-index: 999; pointer-events: none; white-space: nowrap; }
        .active-toast { opacity: 1; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #1e40af; font-weight: 600; background: #eff6ff; }
        .game-card { background: white; border-radius: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .hero-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        @media (max-width: 640px) { .flip-card { height: 170px; } .match-card { min-height: 120px; } }
        .math-formula { font-size: 1rem; overflow-x: auto; white-space: normal; word-break: break-word; padding: 4px 0; }
        .mjx-chtml { font-size: 1.05em; }
    </style>
</head>
<body>
<div class="max-w-7xl mx-auto px-3 md:px-6 py-4 md:py-6">
    <div class="flex flex-wrap justify-between items-center gap-3 mb-5">

            <i class="fas fa-square-root-alt text-3xl text-blue-600"></i>

        </div>
        <div class="flex flex-wrap gap-1 bg-white/70 rounded-full shadow-sm p-1">

</div>
<div id="toastMsg" class="toast">✨ 提示</div>

<script>
    // 音效
    let audioCtx = null;
    function playCorrectSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const play = () => {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.3;
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.3);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(play);
        else play();
    }
    function playWrongSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const play = () => {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.value = 220;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.4);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(play);
        else play();
    }

    // ======================= 标准 LaTeX 公式数据 =======================
    const FORMULAS_LATEX = [
        [1, "有限集合子集个数", "$2^{n}$ (真子集 $2^{n}-1$)"],
        [2, "集合包含关系", "$A \\cap B = A \\Rightarrow A \\subseteq B$"],
        [3, "集合元素个数公式", "$n(A \\cup B)=n(A)+n(B)-n(A \\cap B)$"],
        [4, "均值不等式 (a,b>0)", "$a+b \\ge 2\\sqrt{ab}$"],
        [5, "基本不等式链", "$\\frac{2}{\\frac1a+\\frac1b} \\le \\sqrt{ab} \\le \\frac{a+b}{2} \\le \\sqrt{\\frac{a^2+b^2}{2}}$"],
        [6, "一元二次不等式解法", "大于取两边，小于取中间"],
        [7, "复数模与共轭", "$|z|=\\sqrt{a^2+b^2},\\bar{z}=a-bi$"],
        [8, "指数运算", "$a^{\\frac{m}{n}}=\\sqrt[n]{a^m}, \\sqrt[n]{a^n}=|a|$ (n偶)"],
        [9, "对数运算法则", "$\\log_a(MN)=\\log_a M+\\log_a N$, $\\log_a\\frac{M}{N}=\\log_a M-\\log_a N$"],
        [10, "换底公式", "$\\log_a b = \\frac{\\log_c b}{\\log_c a}$"],
        [11, "导数基本公式", "$(x^n)'=nx^{n-1}, (\\sin x)'=\\cos x, (\\cos x)'=-\\sin x, (e^x)'=e^x, (\\ln x)'=\\frac1x$"],
        [12, "切线方程", "$y-f(x_0)=f'(x_0)(x-x_0)$"],
        [13, "等差数列通项", "$a_n=a_1+(n-1)d$"],
        [14, "等差数列前n项和", "$S_n=\\frac{n(a_1+a_n)}{2}=na_1+\\frac{n(n-1)}{2}d$"],
        [15, "等比数列通项", "$a_n=a_1q^{n-1}$"],
        [16, "等比数列前n项和", "$S_n=\\frac{a_1(1-q^n)}{1-q}(q\\ne1)$"],
        [17, "裂项相消", "$\\frac{1}{n(n+1)}=\\frac1n-\\frac1{n+1}$"],
        [18, "自然数平方和", "$1^2+2^2+...+n^2=\\frac{n(n+1)(2n+1)}{6}$"],
        [19, "自然数立方和", "$1^3+2^3+...+n^3=\\left[\\frac{n(n+1)}{2}\\right]^2$"],
        [20, "三角函数定义", "$\\sin\\alpha=\\frac{y}{r},\\cos\\alpha=\\frac{x}{r},\\tan\\alpha=\\frac{y}{x}$"],
        [21, "诱导公式", "奇变偶不变，符号看象限"],
        [22, "两角和差公式", "$\\sin(\\alpha\\pm\\beta)=\\sin\\alpha\\cos\\beta\\pm\\cos\\alpha\\sin\\beta$, $\\cos(\\alpha\\pm\\beta)=\\cos\\alpha\\cos\\beta\\mp\\sin\\alpha\\sin\\beta$"],
        [23, "二倍角公式", "$\\sin2\\alpha=2\\sin\\alpha\\cos\\alpha$, $\\cos2\\alpha=\\cos^2\\alpha-\\sin^2\\alpha=2\\cos^2\\alpha-1=1-2\\sin^2\\alpha$"],
        [24, "降幂公式", "$\\sin^2\\alpha=\\frac{1-\\cos2\\alpha}{2},\\cos^2\\alpha=\\frac{1+\\cos2\\alpha}{2}$"],
        [25, "辅助角公式", "$a\\sin x+b\\cos x=\\sqrt{a^2+b^2}\\sin(x+\\varphi)$"],
        [26, "正弦定理", "$\\frac{a}{\\sin A}=\\frac{b}{\\sin B}=\\frac{c}{\\sin C}=2R$"],
        [27, "余弦定理", "$a^2=b^2+c^2-2bc\\cos A$"],
        [28, "三角形面积公式", "$S=\\frac12ab\\sin C$"],
        [29, "向量数量积", "$\\vec{a}\\cdot\\vec{b}=|\\vec{a}||\\vec{b}|\\cos\\theta = x_1x_2+y_1y_2$"],
        [30, "向量垂直判定", "$\\vec{a}\\perp\\vec{b}\\Leftrightarrow x_1x_2+y_1y_2=0$"],
        [31, "点到直线距离", "$d=\\frac{|Ax_0+By_0+C|}{\\sqrt{A^2+B^2}}$"],
        [32, "圆的标准方程", "$(x-a)^2+(y-b)^2=r^2$"],
        [33, "椭圆定义", "$|PF_1|+|PF_2|=2a (2a>|F_1F_2|)$"],
        [34, "椭圆离心率", "$e=\\frac{c}{a}\\in(0,1)$"],
        [35, "双曲线定义", "$||PF_1|-|PF_2||=2a (2a<|F_1F_2|)$"],
        [36, "双曲线渐近线", "$y=\\pm\\frac{b}{a}x$"],
        [37, "抛物线定义", "$|PF|=$ 到准线距离，标准方程 $y^2=2px$"],
        [38, "抛物线焦点弦长", "$|AB|=x_1+x_2+p=\\frac{2p}{\\sin^2\\alpha}$"],
        [39, "椭圆焦半径", "$|PF|=a\\pm ex_0$"],
        [40, "点差法斜率", "$k_{\\text{椭}}=-\\frac{b^2x_0}{a^2y_0}$"],
        [41, "古典概型", "$P(A)=\\frac{n_A}{n_\\Omega}$"],
        [42, "组合数公式", "$C_n^m=\\frac{n!}{m!(n-m)!}$"],
        [43, "二项式定理", "$(a+b)^n=\\sum_{k=0}^n C_n^k a^{n-k}b^k$"],
        [44, "二项分布", "$P(X=k)=C_n^k p^k (1-p)^{n-k}$, $E(X)=np$, $D(X)=np(1-p)$"],
        [45, "线性回归方程", "$\\hat{b}=\\frac{\\sum(x_i-\\bar{x})(y_i-\\bar{y})}{\\sum(x_i-\\bar{x})^2},\\; \\hat{a}=\\bar{y}-\\hat{b}\\bar{x}$"],
        [46, "正态分布3σ原则", "$P(\\mu-\\sigma<X<\\mu+\\sigma)\\approx0.6827$"],
        [47, "极坐标与直角互化", "$x=\\rho\\cos\\theta,\\; y=\\rho\\sin\\theta,\\; \\rho^2=x^2+y^2$"],
        [48, "直线参数方程", "$x=x_0+t\\cos\\alpha,\\; y=y_0+t\\sin\\alpha$ (t为参数)"],
        [49, "柯西不等式", "$(\\sum a_i^2)(\\sum b_i^2) \\ge (\\sum a_i b_i)^2$"],
        [50, "绝对值不等式", "$||a|-|b||\\le |a\\pm b|\\le |a|+|b|$"],
        [51, "长方体外接球半径", "$2R=\\sqrt{a^2+b^2+c^2}$"],
        [52, "正四面体高", "$h=\\frac{\\sqrt{6}}{3}a$"],
        [53, "空间向量线线角", "$\\cos\\theta=\\frac{|\\vec{a}\\cdot\\vec{b}|}{|\\vec{a}||\\vec{b}|}$"],
        [54, "点到平面距离(向量法)", "$d=\\frac{|\\vec{PA}\\cdot\\vec{n}|}{|\\vec{n}|}$"],
        [55, "斜率公式", "$k=\\frac{y_2-y_1}{x_2-x_1}=\\tan\\alpha$"],
        [56, "两直线垂直", "$k_1k_2=-1 \\Leftrightarrow A_1A_2+B_1B_2=0$"],
        [57, "等差数列性质", "$m+n=p+q \\Rightarrow a_m+a_n=a_p+a_q$"],
        [58, "等比数列性质", "$m+n=p+q \\Rightarrow a_m a_n = a_p a_q$"],
        [59, "裂项相消进阶", "$\\frac{1}{n(n+2)}=\\frac12(\\frac1n-\\frac1{n+2})$"],
        [60, "三角函数万能公式", "$\\sin\\alpha=\\frac{2\\tan\\frac\\alpha2}{1+\\tan^2\\frac\\alpha2}$"],
        [61, "射影定理", "$a\\cos B+b\\cos A=c$"],
        [62, "椭圆焦点三角形面积", "$S=b^2\\tan\\frac{\\theta}{2}$"],
        [63, "双曲线焦点三角形面积", "$S=b^2\\cot\\frac{\\theta}{2}$"],
        [64, "抛物线焦半径", "$|AF|=x_0+\\frac{p}{2}$"],
        [65, "抛物线焦点弦性质", "$\\frac1{|AF|}+\\frac1{|BF|}=\\frac2p$"],
        [66, "条件概率", "$P(B|A)=\\frac{P(AB)}{P(A)}$"],
        [67, "超几何分布期望", "$E(X)=n\\frac{M}{N}$"],
        [68, "二项式系数和", "$C_n^0+C_n^1+...+C_n^n=2^n$"],
        [69, "奇数项系数和", "$C_n^0+C_n^2+...=2^{n-1}$"],
        [70, "复数除法", "$\\frac{z_1}{z_2}=\\frac{z_1\\bar{z_2}}{|z_2|^2}$"],
        [71, "函数周期性", "$f(x+T)=f(x)$"],
        [72, "奇函数性质", "$f(-x)=-f(x)$"],
        [73, "偶函数性质", "$f(-x)=f(x)$"],
        [74, "对数平均不等式", "$\\frac{2}{\\frac1a+\\frac1b} \\le \\sqrt{ab} \\le \\frac{a+b}{2}$"],
        [75, "权方和不等式", "$\\frac{x^2}{a}+\\frac{y^2}{b} \\ge \\frac{(x+y)^2}{a+b}$"],
        [76, "点到圆切线长", "$d=\\sqrt{|PO|^2-r^2}$"],
        [77, "椭圆通径", "$\\frac{2b^2}{a}$"],
        [78, "双曲线通径", "$\\frac{2b^2}{a}$"],
        [79, "抛物线通径", "$2p$"],
        [80, "复数的模性质", "$|z_1z_2|=|z_1||z_2|$"]
    ];
    
    let fullFormulas = FORMULAS_LATEX.map(([id, name, latex]) => ({ id, name, latex, category: "核心公式" }));
    fullFormulas.sort((a,b) => a.id - b.id);
    document.getElementById("formulaCountBadge").innerText = fullFormulas.length + "个公式";
    const allCategories = [...new Set(fullFormulas.map(f => f.category))];
    
    let currentTab = "home";
    let memoryCards = [], memoryFlipped = [], memoryLock = false, firstSelectedIdx = null;
    let matchItems = [], selectedMatchIdx = null, matchScore = 0;
    let quizQuestions = [], quizIndex = 0, quizScore = 0, quizStreak = 0, quizTimeLeft = 12, quizTimer = null;
    
    function showToast(msg) {
        const toast = document.getElementById("toastMsg");
        toast.innerText = msg;
        toast.classList.add("active-toast");
        setTimeout(() => toast.classList.remove("active-toast"), 1800);
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // 通用：渲染公式容器（MathJax 会自动识别 .math-formula 内的 $...$）
    function createFormulaElement(latex) {
        const div = document.createElement('div');
        div.className = 'math-formula';
        div.textContent = latex;  // 原始 LaTeX 字符串，MathJax 会解析
        return div;
    }
    
    // 首页渲染
    function renderHome(container) {
        container.innerHTML = `
            <div class="hero-gradient text-white rounded-3xl p-6 md:p-10 mb-8 shadow-xl">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div>
                        <div class="flex flex-wrap items-baseline gap-2">
                            <h2 class="text-3xl md:text-5xl font-bold">🧮 玩转高中数学</h2>
                            <span class="text-base md:text-lg text-white/80 font-medium tracking-wide"><i class="fas fa-river mr-1"></i>小河数学 出品</span>
                        </div>
                        <p class="text-lg md:text-xl opacity-90 mt-1">${fullFormulas.length}个核心公式 · 三款趣味游戏 · 轻松记忆</p>
                        <div class="flex gap-3 mt-5">
                            <button onclick="document.querySelector('[data-tab=\\'memory\\']').click()" class="bg-white text-purple-700 px-5 py-2 rounded-full font-semibold shadow-md hover:shadow-lg transition">🎮 开始挑战</button>
                            <button onclick="document.querySelector('[data-tab=\\'library\\']').click()" class="bg-purple-800 text-white px-5 py-2 rounded-full font-semibold shadow-md hover:bg-purple-900 transition">📖 浏览公式库</button>
                        </div>
                    </div>
                    <i class="fas fa-calculator text-7xl md:text-8xl opacity-30 mt-4 md:mt-0"></i>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-2xl p-6 shadow-md text-center hover:shadow-lg transition">
                    <i class="fas fa-dice-d6 text-4xl text-blue-500 mb-3"></i>
                    <h3 class="text-xl font-bold">📚 公式库</h3>
                    <p class="text-gray-600 mt-2">涵盖代数、几何、三角、概率等全部章节，支持搜索和分类筛选</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-md text-center hover:shadow-lg transition">
                    <i class="fas fa-brain text-4xl text-green-500 mb-3"></i>
                    <h3 class="text-xl font-bold">🧠 记忆卡片</h3>
                    <p class="text-gray-600 mt-2">翻转配对，考验公式名称与表达式的匹配能力</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-md text-center hover:shadow-lg transition">
                    <i class="fas fa-bolt text-4xl text-yellow-500 mb-3"></i>
                    <h3 class="text-xl font-bold">⚡ 速答挑战</h3>
                    <p class="text-gray-600 mt-2">限时作答，连击加分，挑战你的反应与知识储备</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-md">
                <h3 class="text-xl font-bold mb-3">✨ 今日推荐公式</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="homeFormulas"></div>
                <div class="mt-5 text-center text-gray-500 text-sm">🎯 共收录 ${fullFormulas.length} 个实用公式，每日进步一点点</div>
            </div>
        `;
        const containerDiv = document.getElementById('homeFormulas');
        fullFormulas.slice(0, 4).forEach(f => {
            const card = document.createElement('div');
            card.className = 'border-l-4 border-blue-500 pl-4 py-2';
            card.innerHTML = `<div class="font-semibold">${escapeHtml(f.name)}</div>`;
            const formulaDiv = createFormulaElement(f.latex);
            card.appendChild(formulaDiv);
            containerDiv.appendChild(card);
        });
        // MathJax 会自动渲染新添加的元素
        if (window.MathJax) MathJax.typesetPromise();
    }
    
    // 公式库
    function renderLibrary(container) {
        const searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
        const activeCat = document.getElementById("categoryFilters")?.dataset.activeCat || "all";
        let filtered = fullFormulas.filter(f => f.name.toLowerCase().includes(searchTerm) || f.latex.toLowerCase().includes(searchTerm));
        if(activeCat !== "all") filtered = filtered.filter(f => f.category === activeCat);
        document.getElementById("formulaCount") && (document.getElementById("formulaCount").innerText = filtered.length);
        const cats = ["all", ...allCategories];
        const filterHtml = cats.map(cat => `<button data-cat="${cat}" class="cat-filter px-3 py-1.5 rounded-full text-xs md:text-sm ${activeCat===cat ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'}">${cat==='all'?'全部':cat}</button>`).join('');
        const filterDiv = document.getElementById("categoryFilters");
        if(filterDiv) {
            filterDiv.innerHTML = filterHtml;
            filterDiv.dataset.activeCat = activeCat;
            document.querySelectorAll(".cat-filter").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    filterDiv.dataset.activeCat = btn.dataset.cat;
                    renderLibrary(container);
                });
            });
        }
        container.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="libraryGrid"></div>`;
        const grid = document.getElementById('libraryGrid');
        filtered.forEach(f => {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-md p-4 border flex flex-col h-full';
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-xs font-mono bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">#${f.id}</span>
                    <span class="text-xs text-gray-400">${f.category}</span>
                </div>
                <div class="font-semibold text-gray-800 mt-2 mb-2">${escapeHtml(f.name)}</div>
            `;
            const formulaDiv = createFormulaElement(f.latex);
            formulaDiv.classList.add('bg-gray-50', 'p-3', 'rounded-lg');
            card.appendChild(formulaDiv);
            grid.appendChild(card);
        });
        if (window.MathJax) MathJax.typesetPromise();
    }
    
    // 记忆卡片
    function initMemoryGame() {
        const pool = [...fullFormulas].sort(()=>0.5-Math.random()).slice(0,12);
        memoryCards = pool.flatMap(f => [
            { id: f.id, type: 'name', content: f.name, matchId: f.id },
            { id: f.id, type: 'latex', content: f.latex, matchId: f.id }
        ]);
        for(let i=memoryCards.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [memoryCards[i],memoryCards[j]]=[memoryCards[j],memoryCards[i]]; }
        memoryFlipped = new Array(memoryCards.length).fill(false);
        memoryLock = false; firstSelectedIdx = null;
    }
    function renderMemoryGame(container) {
        if(memoryCards.length===0) initMemoryGame();
        container.innerHTML = `<div class="game-card p-4"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">🧠 记忆配对</h2><button id="resetMemoryBtn" class="bg-blue-500 text-white px-4 py-1.5 rounded-full text-sm">🔄 洗牌</button></div><div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3" id="memoryGrid"></div></div>`;
        const grid = document.getElementById('memoryGrid');
        memoryCards.forEach((card, idx) => {
            const flipDiv = document.createElement('div');
            flipDiv.className = `flip-card ${memoryFlipped[idx] ? 'flipped' : ''}`;
            flipDiv.dataset.memidx = idx;
            flipDiv.innerHTML = `<div class="flip-card-inner">
                <div class="flip-front"></div>
                <div class="flip-back"><i class="fas fa-brain text-2xl"></i><span class="text-xs mt-1">点击配对</span></div>
            </div>`;
            const frontDiv = flipDiv.querySelector('.flip-front');
            if (card.type === 'name') {
                frontDiv.textContent = card.content;
            } else {
                const formulaDiv = createFormulaElement(card.content);
                frontDiv.appendChild(formulaDiv);
            }
            grid.appendChild(flipDiv);
        });
        if (window.MathJax) MathJax.typesetPromise();
        document.querySelectorAll('.flip-card').forEach(div => {
            const idx = parseInt(div.dataset.memidx);
            div.addEventListener('click', () => handleMemoryFlip(idx, container));
        });
        document.getElementById('resetMemoryBtn')?.addEventListener('click', () => { initMemoryGame(); renderMemoryGame(container); });
    }
    function handleMemoryFlip(idx, container) {
        if(memoryLock || memoryFlipped[idx]) return;
        memoryFlipped[idx] = true;
        if(firstSelectedIdx === null) { firstSelectedIdx = idx; renderMemoryGame(container); return; }
        const cardA = memoryCards[firstSelectedIdx], cardB = memoryCards[idx];
        if(cardA.matchId === cardB.matchId && cardA.type !== cardB.type) {
            playCorrectSound();
            memoryLock = true;
            setTimeout(() => {
                memoryFlipped[firstSelectedIdx] = true;
                memoryFlipped[idx] = true;
                firstSelectedIdx = null; memoryLock = false;
                renderMemoryGame(container);
                showToast("✔ 配对成功！");
                if(memoryFlipped.every(v=>v===true)) showToast("🎉 恭喜全配对！");
            }, 400);
        } else {
            playWrongSound();
            memoryLock = true;
            setTimeout(() => {
                memoryFlipped[firstSelectedIdx] = false;
                memoryFlipped[idx] = false;
                firstSelectedIdx = null; memoryLock = false;
                renderMemoryGame(container);
            }, 600);
        }
        renderMemoryGame(container);
    }
    
    // 配对游戏
    function initMatching() {
        const subset = [...fullFormulas].sort(()=>0.5-Math.random()).slice(0,8);
        matchItems = subset.flatMap(f => [
            { id: f.id, type: 'name', text: f.name, matchId: f.id, matched: false },
            { id: f.id, type: 'latex', text: f.latex, matchId: f.id, matched: false }
        ]);
        matchItems.sort(()=>Math.random()-0.5);
        matchScore = 0; selectedMatchIdx = null;
    }
    function renderMatchingGame(container) {
        if(matchItems.length===0) initMatching();
        const totalPairs = matchItems.length/2;
        const matchedCount = matchItems.filter(m=>m.matched).length/2;
        container.innerHTML = `<div class="game-card p-5"><div class="flex justify-between items-center"><h2 class="text-xl font-bold">🔗 公式配对</h2><div>✅ ${matchedCount}/${totalPairs} <button id="resetMatchBtn" class="ml-3 bg-gray-200 px-3 py-1 rounded-full text-sm">重置</button></div></div><div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5" id="matchGrid"></div></div>`;
        const grid = document.getElementById('matchGrid');
        matchItems.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = `match-card p-3 border rounded-xl text-center cursor-pointer ${selectedMatchIdx===idx ? 'selected' : ''} ${item.matched ? 'matched' : ''}`;
            card.style.minHeight = '130px';
            card.dataset.mid = idx;
            card.innerHTML = `<div class="text-xs text-gray-400 mb-1">${item.type==='name'?'📖 名称':'📐 公式'}</div>`;
            if (item.type === 'name') {
                const nameDiv = document.createElement('div');
                nameDiv.className = 'text-sm font-medium';
                nameDiv.textContent = item.text;
                card.appendChild(nameDiv);
            } else {
                const formulaDiv = createFormulaElement(item.text);
                card.appendChild(formulaDiv);
            }
            grid.appendChild(card);
        });
        if (window.MathJax) MathJax.typesetPromise();
        document.querySelectorAll('.match-card').forEach(card => {
            const idx = parseInt(card.dataset.mid);
            if(matchItems[idx].matched) return;
            card.addEventListener('click', () => {
                if(selectedMatchIdx === null) { selectedMatchIdx = idx; renderMatchingGame(container); }
                else {
                    const a = matchItems[selectedMatchIdx], b = matchItems[idx];
                    if(a.matchId === b.matchId && a.type !== b.type && !a.matched && !b.matched) {
                        a.matched = true; b.matched = true; matchScore++;
                        playCorrectSound();
                        showToast("🎯 配对正确！");
                    } else {
                        playWrongSound();
                        showToast("❌ 配对失败");
                    }
                    selectedMatchIdx = null;
                    renderMatchingGame(container);
                }
            });
        });
        document.getElementById('resetMatchBtn')?.addEventListener('click', () => { initMatching(); renderMatchingGame(container); });
    }
    
    // 速答挑战
    function initQuiz() {
        if(quizTimer) clearInterval(quizTimer);
        quizQuestions = [...fullFormulas].sort(()=>0.5-Math.random()).slice(0,20).map(f => ({ question: f.latex, answer: f.name, id: f.id }));
        quizIndex = 0; quizScore = 0; quizStreak = 0; quizTimeLeft = 15;
    }
    function renderQuizGame(container) {
        if(quizQuestions.length === 0) initQuiz();
        if(quizIndex >= quizQuestions.length) {
            container.innerHTML = `<div class="game-card p-8 text-center"><i class="fas fa-crown text-6xl text-yellow-500"></i><h2 class="text-2xl font-bold mt-3">挑战完成</h2><p class="text-lg">得分: ${quizScore} / ${quizQuestions.length}</p><button id="restartQuizBtn" class="mt-5 bg-blue-600 text-white px-6 py-2 rounded-full">重新挑战</button></div>`;
            document.getElementById("restartQuizBtn")?.addEventListener("click", () => { initQuiz(); renderQuizGame(container); });
            return;
        }
        const q = quizQuestions[quizIndex];
        container.innerHTML = `<div class="game-card p-6 max-w-2xl mx-auto" id="quizStaticContainer">
            <div class="flex justify-between text-sm">
                <span>📌 第 <span id="quizCurrentIdx">${quizIndex+1}</span> / ${quizQuestions.length}</span>
                <span>🔥 连击 <span id="quizStreak">${quizStreak}</span></span>
                <span>⏱️ <span id="quizTimerDisplay">${quizTimeLeft}</span> 秒</span>
            </div>
            <div class="my-6 text-center p-5 bg-gray-50 rounded-xl" id="quizFormula"></div>
            <input id="quizAnswerInput" type="text" placeholder="输入公式名称..." class="w-full p-3 border rounded-xl" autocomplete="off">
            <button id="submitQuizAnswer" class="w-full mt-4 bg-blue-600 text-white py-2.5 rounded-xl font-semibold">提交答案</button>
            <div class="text-xs text-gray-400 mt-2">💡 支持模糊匹配</div>
        </div>`;
        const formulaContainer = document.getElementById('quizFormula');
        const formulaDiv = createFormulaElement(q.question);
        formulaContainer.appendChild(formulaDiv);
        if (window.MathJax) MathJax.typesetPromise();
        
        const inputEl = document.getElementById("quizAnswerInput");
        const submitBtn = document.getElementById("submitQuizAnswer");
        const handleAnswer = () => {
            const userAns = inputEl.value.trim().toLowerCase();
            const correct = q.answer.toLowerCase();
            if(userAns.length > 0 && (correct.includes(userAns) || userAns.includes(correct.substring(0,6)))) {
                quizScore++; quizStreak++;
                playCorrectSound();
                showToast("✅ 回答正确！ +1分");
            } else {
                playWrongSound();
                showToast(`❌ 正确答案: ${q.answer.substring(0,50)}`);
                quizStreak = 0;
            }
            quizIndex++;
            quizTimeLeft = 15;
            if(quizIndex < quizQuestions.length) renderQuizGame(container);
            else renderQuizGame(container);
        };
        submitBtn?.addEventListener("click", handleAnswer);
        inputEl?.addEventListener("keypress", (e) => { if(e.key === "Enter") handleAnswer(); });
        inputEl?.focus();
        
        if(quizTimer) clearInterval(quizTimer);
        quizTimer = setInterval(() => {
            if(currentTab !== "quiz") { clearInterval(quizTimer); return; }
            if(quizIndex >= quizQuestions.length) { clearInterval(quizTimer); return; }
            if(quizTimeLeft <= 1) {
                clearInterval(quizTimer);
                playWrongSound();
                showToast("⏰ 超时！进入下一题");
                quizIndex++;
                quizStreak = 0;
                quizTimeLeft = 15;
                if(quizIndex < quizQuestions.length) renderQuizGame(container);
                else renderQuizGame(container);
            } else {
                quizTimeLeft--;
                const timerSpan = document.getElementById("quizTimerDisplay");
                if(timerSpan) timerSpan.innerText = quizTimeLeft;
                const streakSpan = document.getElementById("quizStreak");
                if(streakSpan) streakSpan.innerText = quizStreak;
                const idxSpan = document.getElementById("quizCurrentIdx");
                if(idxSpan) idxSpan.innerText = quizIndex+1;
            }
        }, 1000);
    }
    
    function renderCurrentTab() {
        const container = document.getElementById("appContent");
        if(currentTab === "home") renderHome(container);
        else if(currentTab === "library") renderLibrary(container);
        else if(currentTab === "memory") renderMemoryGame(container);
        else if(currentTab === "matching") renderMatchingGame(container);
        else if(currentTab === "quiz") renderQuizGame(container);
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
            if(btn.dataset.tab === currentTab) btn.classList.add("tab-active");
            else btn.classList.remove("tab-active");
        });
        const searchBar = document.getElementById("librarySearchBar");
        if(currentTab === "library") searchBar.classList.remove("hidden");
        else searchBar.classList.add("hidden");
    }
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            currentTab = btn.dataset.tab;
            if(currentTab === "memory") initMemoryGame();
            if(currentTab === "matching") initMatching();
            if(currentTab === "quiz") { if(quizTimer) clearInterval(quizTimer); initQuiz(); }
            renderCurrentTab();
        });
    });
    document.getElementById("searchInput")?.addEventListener("input", () => renderCurrentTab());
    renderCurrentTab();
</script>
</body>
</html>
